name: Test workflow

on:
  workflow_dispatch:
    inputs:
      llvmVersion:
        required: true
        default: "22.1.1"
        type: string
      boostVersion:
        required: true
        default: "1.90.0"
        type: string
      icuVersion:
        required: true
        default: "78.3"
        type: string

jobs:
  create_release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create llvm${{ inputs.llvmVersion }}_boost${{ inputs.boostVersion }}_icu${{ inputs.icuVersion }} --title "llvm ${{ inputs.llvmVersion }}, boost ${{ inputs.boostVersion }}, icu4c ${{ inputs.icuVersion }}" --notes "Release notes are updated manually, so it is work in progress" --draft

  llvm_macos:
    name: LLVM for Windows (x64, win32, arm64)
    needs: [create_release]
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set release name
        run: echo "RELEASE_NAME=llvm${{ inputs.llvmVersion }}_boost${{ inputs.boostVersion }}_icu${{ inputs.icuVersion }}" >> "$GITHUB_ENV"
      - name: Install Visual Studio Community
        shell: powershell
        run: |
          Set-Location "C:\Program Files (x86)\Microsoft Visual Studio\Installer\"
          $InstallPath = "C:\Program Files\Microsoft Visual Studio\2022\Community"
          $componentsToAdd= @(
            "Microsoft.VisualStudio.Component.VC.Tools.x86.x64"
            "Microsoft.VisualStudio.Component.VC.Tools.ARM64"
            "Microsoft.VisualStudio.Component.Windows11SDK.26100"
            "Microsoft.VisualStudio.Component.Windows11SDK.22621"
            "Microsoft.Component.MSBuild"
            "Microsoft.VisualStudio.Component.VC.ATLMFC"
            "Microsoft.VisualStudio.Component.VC.ATL.ARM64"
            "Microsoft.VisualStudio.Component.VC.MFC.ARM64"
          )
          [string]$workloadArgs = $componentsToAdd | ForEach-Object {" --add " +  $_}
          $Arguments = ('/c', "vs_installer.exe", 'modify', '--installPath', "`"$InstallPath`"",$workloadArgs, '--quiet', '--norestart', '--nocache')
          Start-Process -FilePath cmd.exe -ArgumentList $Arguments -Wait -PassThru -WindowStyle Hidden
      - name: Download LLVM source
        uses: robinraju/release-downloader@v1
        with:
          repository: "llvm/llvm-project"
          tag: llvmorg-${{ inputs.llvmVersion }}
          fileName: llvm-project-${{ inputs.llvmVersion }}.src.tar.xz
          extract: true
      - name: Extract LLVM source
        shell: powershell
        run: |
          tar -xJf llvm-project-${{ inputs.llvmVersion }}.src.tar.xz
          Rename-Item -Path llvm-project-${{ inputs.llvmVersion }}.src -NewName llvm-project
          New-Item -Path llvm

      - name: Build LLVM for x64
        working-directory: llvm-project/llvm
        shell: powershell
        run: |
          cmake -S . -B "$GITHUB_WORKSPACE/llvm-project/llvm/build" -DCMAKE_BUILD_TYPE=Release -A x64 -G"Visual Studio 17 2022"

