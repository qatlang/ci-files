  macos_icu4c:
    name: icu4c for macOS (arm64, x64)
    runs-on: macos-latest
    needs: [create_release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set release name
        run: echo "RELEASE_NAME=llvm${{ inputs.llvmVersion }}_boost${{ inputs.boostVersion }}_icu${{ inputs.icuVersion }}" >> "$GITHUB_ENV"
      - name: Create directories
        run: |
          mkdir icu4c
          mkdir build_arm64
          mkdir build_x64
      - name: Download icu4c source
        run: |
          wget https://github.com/unicode-org/icu/releases/download/release-${{ inputs.icuVersion }}/icu4c-${{ inputs.icuVersion }}-sources.tgz
          tar -xzf icu4c-${{ inputs.icuVersion }}-sources.tgz

      - name: Getting SDK Path
        run: echo "SDK_PATH=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"
      - name: Building for arm64
        working-directory: build_arm64
        run: |
          CFLAGS="-std=c11 -arch arm64 -target arm64-apple-macos11 -mmacosx-version-min=11.0 -isysroot $SDK_PATH" CXXFLAGS="-std=c++20 -arch arm64 -target arm64-apple-macos11 -mmacosx-version-min=11.0 -isysroot $SDK_PATH" ../icu/source/configure --prefix="$GITHUB_WORKSPACE/icu4c" --enable-static --disable-shared
          make -j6
          make install
      - name: Compress build for arm64
        run: tar -cvzf icu4c_macos_arm64.tar.gz icu4c
      - name: Uploading build for arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_NAME" icu4c_macos_arm64.tar.gz --clobber

      - name: Building for x64
        working-directory: build_x64
        run: |
          CFLAGS="-std=c11 -arch x86_64 -target x86_64-apple-darwin -isysroot $SDK_PATH" CXXFLAGS="-std=c++20 -arch x86_64 -target x86_64-apple-darwin -isysroot $SDK_PATH" ../icu/source/configure --prefix="$GITHUB_WORKSPACE/icu4c" --host="x86_64-apple-darwin" --build="arm64-apple-macos11" --enable-static --disable-shared --with-cross-build="$GITHUB_WORKSPACE/build_arm64"
          make -j6
          make install
      - name: Compress build for x64
        run: tar -cvzf icu4c_macos_x64.tar.gz icu4c
      - name: Uploading build for x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_NAME" icu4c_macos_x64.tar.gz --clobber

  macos_boost:
    name: Boost for macOS (arm64, x64)
    runs-on: macos-latest
    needs: [create_release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set release name
        run: echo "RELEASE_NAME=llvm${{ inputs.llvmVersion }}_boost${{ inputs.boostVersion }}_icu${{ inputs.icuVersion }}" >> "$GITHUB_ENV"
      - name: Download boost source
        run: |
          wget https://github.com/boostorg/boost/releases/download/boost-${{ inputs.boostVersion }}/boost-${{ inputs.boostVersion }}-b2-nodocs.tar.gz
          tar -xzf boost-${{ inputs.boostVersion }}-b2-nodocs.tar.gz
          mv boost-${{ inputs.boostVersion }} boost-project
          mkdir boost
      - name: Building b2
        working-directory: boost-project
        run: ./bootstrap.sh
      - name: Get SDK path
        run: echo "SDK_PATH=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Building for arm64
        working-directory: boost-project
        run: ./b2 toolset=clang architecture=arm address-model=64 variant=release threading=multi link=static cxxflags="-std=c++20 -arch arm64 -target arm64-apple-macos11 -mmacosx-version-min=11.0 -isysroot $SDK_PATH" --prefix="$GITHUB_WORKSPACE/boost" --with-filesystem --with-json --with-process install
      - name: Compressing build for arm64
        run: tar -czf boost_macos_arm64.tar.gz boost
      - name: Uploading build for arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_NAME" boost_macos_arm64.tar.gz --clobber
          rm -rf boost/*

      - name: Building for x64
        working-directory: boost-project
        run: ./b2 toolset=clang architecture=x86 address-model=64 variant=release threading=multi link=static cxxflags="-std=c++20 -arch x86_64 -target x86_64-apple-darwin -isysroot $SDK_PATH" --prefix="$GITHUB_WORKSPACE/boost" --with-filesystem --with-json --with-process install
      - name: Compressing build for x64
        run: tar -czf boost_macos_x64.tar.gz boost
      - name: Uploading build for x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_NAME" boost_macos_x64.tar.gz --clobber

